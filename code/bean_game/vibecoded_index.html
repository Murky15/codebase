<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="author" content="Gianni Bernardi" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Bean Game: Main Page - Paper Airplane Games</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }
    body > canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="gl-canvas">Please enable Javascript!</canvas>
<script type="module">

  // =========================================================================
  // Low-level state
  // =========================================================================

  const canvas = document.getElementById("gl-canvas");
  const gl = canvas.getContext("webgl", { alpha: false, antialias: true });
  if (gl == null) {
    console.error("Unable to initialize WebGL!");
  }

  // Images/canvases uploaded via texImage2D come in row-0-at-top. Flipping
  // here means UV (0,0) ends up at the bottom-left of the *visual* image,
  // matching this renderer's bottom-left/y-up world space.
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

  const fontCanvas     = document.createElement("canvas");
  const fontBackBuffer = fontCanvas.getContext("2d");

  let allocated  = null; // WebAssembly.Memory, set once the module is instantiated
  let instance   = null;
  let jaiContext = null;

  function jaiView() {
    return new DataView(allocated.buffer);
  }

  const textDecoder = new TextDecoder();
  function jaiString(ptr) {
    // Jai `string` / `[] T` are laid out as {count: s64, data: *T}
    const view  = jaiView();
    const count = view.getBigInt64(Number(ptr), true);
    const data  = view.getBigInt64(Number(ptr) + 8, true);
    return { count: Number(count), data: Number(data) };
  }

  function jsStringFromJaiString(ptr) {
    const { count, data } = jaiString(ptr);
    const bytes = new Uint8Array(allocated.buffer, data, count);
    return textDecoder.decode(bytes);
  }

  function readVec2(ptr) {
    const v = jaiView();
    const p = Number(ptr);
    return [v.getFloat32(p, true), v.getFloat32(p + 4, true)];
  }
  function readVec3(ptr) {
    const v = jaiView();
    const p = Number(ptr);
    return [v.getFloat32(p, true), v.getFloat32(p + 4, true), v.getFloat32(p + 8, true)];
  }
  function readVec4(ptr) {
    const v = jaiView();
    const p = Number(ptr);
    return [
      v.getFloat32(p,      true),
      v.getFloat32(p + 4,  true),
      v.getFloat32(p + 8,  true),
      v.getFloat32(p + 12, true),
    ];
  }

  // =========================================================================
  // ABI debug probe
  // =========================================================================
  // Struct-passing/returning conventions for Jai's wasm #foreign calls
  // aren't fully knowable without inspecting the compiled module, so this
  // logs the real argument shapes the first time each import is called.
  // Once the signatures below are confirmed correct, flip this to false.
  const DEBUG_ABI = true;
  const loggedOnce = new Set();
  function describeArg(a) {
    return `${typeof a}${typeof a === "bigint" ? "n" : ""}(${a})`;
  }
  function withAbiProbe(fns) {
    if (!DEBUG_ABI) return fns;
    const wrapped = {};
    for (const name of Object.keys(fns)) {
      wrapped[name] = (...args) => {
        if (!loggedOnce.has(name)) {
          loggedOnce.add(name);
          console.debug(`[ABI PROBE] ${name}(${args.map(describeArg).join(", ")})`);
        }
        return fns[name](...args);
      };
    }
    return wrapped;
  }

  // =========================================================================
  // console log passthrough (wasm_write_string / wasm_debug_break)
  // =========================================================================

  let console_buffer = "";
  let console_buffer_is_standard_error;
  let console_timeout;
  const FLUSH_CONSOLE_AFTER_MS = 3;
  function write_to_console_log(str, to_standard_error) {
    if (console_buffer && console_buffer_is_standard_error != to_standard_error) flush_buffer();
    console_buffer_is_standard_error = to_standard_error;
    const lines = str.split("\n");
    for (let i = 0; i < lines.length - 1; i++) {
      console_buffer += lines[i];
      flush_buffer();
    }
    console_buffer += lines[lines.length - 1];
    clearTimeout(console_timeout);
    if (console_buffer) console_timeout = setTimeout(flush_buffer, FLUSH_CONSOLE_AFTER_MS);
    function flush_buffer() {
      if (!console_buffer) return;
      (console_buffer_is_standard_error ? console.error : console.log)(console_buffer);
      console_buffer = "";
    }
  }

  // =========================================================================
  // Shader program (shared color + textured-quad pipeline)
  // =========================================================================

  function compileShader(kind, source) {
    const shader = gl.createShader(kind);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      console.error(`(WebGL) shader compile error: ${gl.getShaderInfoLog(shader)}`);
      gl.deleteShader(shader);
      return null;
    }
    return shader;
  }

  function createProgram(vsSource, fsSource) {
    const vs = compileShader(gl.VERTEX_SHADER, vsSource);
    const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
    const program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.error(`(WebGL) program link error: ${gl.getProgramInfoLog(program)}`);
      return null;
    }
    return program;
  }

  const vsSource = `
    attribute vec2 aPosition;
    attribute vec4 aColor;
    attribute vec2 aTexCoord;

    uniform mat4 uProjMatrix;

    varying lowp vec4 vColor;
    varying highp vec2 vTexCoord;

    void main() {
      gl_Position = uProjMatrix * vec4(aPosition, 0.0, 1.0);
      vColor = aColor;
      vTexCoord = aTexCoord;
    }
  `;

  const fsSource = `
    varying lowp vec4 vColor;
    varying highp vec2 vTexCoord;

    uniform sampler2D uSampler;
    uniform lowp float uUseTexture;

    void main() {
      if (uUseTexture > 0.5) {
        gl_FragColor = vColor * texture2D(uSampler, vTexCoord);
      } else {
        gl_FragColor = vColor;
      }
    }
  `;

  const program = createProgram(vsSource, fsSource);
  const attribs = {
    position: gl.getAttribLocation(program, "aPosition"),
    color:    gl.getAttribLocation(program, "aColor"),
    texCoord: gl.getAttribLocation(program, "aTexCoord"),
  };
  const uniforms = {
    projMatrix:  gl.getUniformLocation(program, "uProjMatrix"),
    sampler:     gl.getUniformLocation(program, "uSampler"),
    useTexture:  gl.getUniformLocation(program, "uUseTexture"),
  };

  const positionBuffer = gl.createBuffer();
  const colorBuffer    = gl.createBuffer();
  const uvBuffer        = gl.createBuffer();

  // =========================================================================
  // Immediate-mode batching state
  // =========================================================================

  let batchPositions = []; // flat [x,y, x,y, ...]
  let batchColors     = []; // flat [r,g,b,a, ...]
  let batchUVs         = []; // flat [u,v, ...]

  let shaderMode           = "color"; // "color" | "image"
  let blendEnabled         = false;
  let currentTextureHandle = null;

  let scissorRect = null; // {x0,y0,x1,y1} in bottom-left/y-up pixel space (RIGHT_HANDED), or null

  function projectionMatrix() {
    // Column-major 4x4 orthographic projection, bottom-left origin, y-up --
    // matches Simp's default Simp_Coordinate_System.RIGHT_HANDED, which is
    // what native uses here (Simp.set_render_target(window) with no coords
    // argument).
    const w = gl.canvas.clientWidth;
    const h = gl.canvas.clientHeight;
    return new Float32Array([
      2 / w, 0,      0, 0,
      0,     2 / h,  0, 0,
      0,     0,     -1, 0,
     -1,    -1,      0, 1,
    ]);
  }

  function flushBatch() {
    const vertexCount = batchPositions.length / 2;
    if (vertexCount === 0) return;

    gl.useProgram(program);

    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(batchPositions), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(attribs.position, 2, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(attribs.position);

    gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(batchColors), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(attribs.color, 4, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(attribs.color);

    gl.bindBuffer(gl.ARRAY_BUFFER, uvBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(batchUVs), gl.DYNAMIC_DRAW);
    gl.vertexAttribPointer(attribs.texCoord, 2, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(attribs.texCoord);

    gl.uniformMatrix4fv(uniforms.projMatrix, false, projectionMatrix());

    const usingTexture = shaderMode === "image" && currentTextureHandle != null
      && textures[currentTextureHandle] && textures[currentTextureHandle].glTexture;

    if (usingTexture) {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, textures[currentTextureHandle].glTexture);
      gl.uniform1i(uniforms.sampler, 0);
      gl.uniform1f(uniforms.useTexture, 1.0);
    } else {
      gl.uniform1f(uniforms.useTexture, 0.0);
    }

    if (scissorRect) {
      gl.enable(gl.SCISSOR_TEST);
      const x = Math.max(0, Math.floor(scissorRect.x0));
      const y = Math.max(0, Math.floor(scissorRect.y0));
      const w = Math.max(0, Math.ceil(scissorRect.x1 - scissorRect.x0));
      const h = Math.max(0, Math.ceil(scissorRect.y1 - scissorRect.y0));
      gl.scissor(x, y, w, h);
    } else {
      gl.disable(gl.SCISSOR_TEST);
    }

    if (blendEnabled || shaderMode === "image") {
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    } else {
      gl.disable(gl.BLEND);
    }

    gl.drawArrays(gl.TRIANGLES, 0, vertexCount);

    batchPositions = [];
    batchColors = [];
    batchUVs = [];
  }

  function pushVertex(x, y, color, u, v) {
    batchPositions.push(x, y);
    batchColors.push(color[0], color[1], color[2], color[3]);
    batchUVs.push(u, v);
  }

  // =========================================================================
  // Texture cache
  // =========================================================================

  const textures = []; // { glTexture, width, height }

  function createPlaceholderTexture() {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([255, 255, 255, 255]));
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    return tex;
  }

  function isPowerOfTwo(n) { return (n & (n - 1)) === 0; }

  // =========================================================================
  // Font cache
  // =========================================================================

  const fonts = []; // { family, pixelHeight, ready, prepared }
  // Keyed by `${data}:${count}:${pixel_height}` -- ASSUMES the same logical
  // font's byte array is passed at the same wasm memory address on every
  // call (true for compile-time-embedded font data, which is the common
  // case). If that's not true here, this cache will just silently miss and
  // fall back to the old per-call allocation behavior instead of breaking.
  const fontCacheByKey = new Map(); // key -> BigInt pointer

  // =========================================================================
  // Mouse tracking (for get_mouse_pointer_position)
  // =========================================================================

  let mouseX = 0, mouseY = 0, mouseInside = false;
  canvas.addEventListener("pointermove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top; // top-left origin, y-down (browser convention)
    mouseInside = true;
  });
  canvas.addEventListener("pointerleave", () => { mouseInside = false; });

  // =========================================================================
  // Draw_Procs implementation
  // =========================================================================

  const exported_js_functions = {
    // ---- Basic ----
    wasm_write_string: (s_count, s_data, to_standard_error) => {
      const bytes = new Uint8Array(allocated.buffer, Number(s_data), Number(s_count));
      write_to_console_log(textDecoder.decode(bytes), to_standard_error);
    },
    wasm_debug_break: () => { debugger; },
    // NOTE: basic_alloc is exported *by* the wasm module (instance.exports.basic_alloc),
    // not imported -- there is nothing to provide here.

    // ---- Draw_Procs ----

    // texture_load_from_memory: (texture: *Texture, memory: [] u8, srgb: bool, build_mipmaps: bool) -> bool
    web_texture_load_from_memory: (texturePtr, memory, srgb, build_mipmaps) => {
      const { count, data } = jaiString(memory);
      const rawPNG = new Uint8Array(allocated.buffer, data, count).slice();

      const glTexture = createPlaceholderTexture();
      const index = textures.push({ glTexture, width: 1, height: 1 }) - 1;

      createImageBitmap(new Blob([rawPNG])).then((bitmap) => {
        gl.bindTexture(gl.TEXTURE_2D, glTexture);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, bitmap);
        if (build_mipmaps && isPowerOfTwo(bitmap.width) && isPowerOfTwo(bitmap.height)) {
          gl.generateMipmap(gl.TEXTURE_2D);
        }
        if (srgb) console.warn("(WebGL) sRGB textures are unsupported in this shim; treating as linear.");
        textures[index].width = bitmap.width;
        textures[index].height = bitmap.height;
      }).catch((err) => console.error(`(Texture) failed to decode image: ${err}`));

      // Texture is JS_Handle :: s32
      jaiView().setInt32(Number(texturePtr), index, true);
      return 1;
    },

    // set_scissor: (x0: s32, y0: s32, x1: s32, y1: s32)
    web_set_scissor: (x0, y0, x1, y1) => {
      flushBatch();
      scissorRect = { x0: Number(x0), y0: Number(y0), x1: Number(x1), y1: Number(y1) };
    },

    // clear_scissor: ()
    web_clear_scissor: () => {
      flushBatch();
      scissorRect = null;
    },

    // set_shader_for_color: (enable_blend := false)
    web_set_shader_for_color: (enable_blend) => {
      flushBatch();
      shaderMode = "color";
      blendEnabled = !!enable_blend;
    },

    // set_shader_for_images: (texture: *Texture)
    web_set_shader_for_images: (texture) => {
      flushBatch();
      shaderMode = "image";
      currentTextureHandle = Number(texture);
    },

    // prepare_text: (font: *Font, text: string, effects: Font_Effects = 0) -> s64
    // NOTE: `font` is a pointer to Web_Font {handle:s32; em_width:s32; character_height:s32};
    // the handle field is our index into `fonts`.
    web_prepare_text: (fontPtr, text, effects) => {
      const handle = jaiView().getInt32(Number(fontPtr), true);
      const fontEntry = fonts[handle];
      if (!fontEntry) {
        console.error(`(Font) prepare_text: invalid font handle ${handle}`);
        return 0n;
      }
      if (!fontEntry.ready) {
        fontEntry.prepared = null;
        return 0n;
      }

      const str = jsStringFromJaiString(text);
      const pixelHeight = fontEntry.pixelHeight;

      fontBackBuffer.font = `${pixelHeight}px ${fontEntry.family}`;
      fontBackBuffer.textBaseline = "alphabetic";
      fontBackBuffer.textAlign = "left";

      const metrics = fontBackBuffer.measureText(str);
      // Prefer fontBoundingBox* (whole-font metrics from the font's own
      // tables) over actualBoundingBox* (per-string ink bounds): custom
      // @font-face fonts are notoriously inconsistent about populating
      // actualBoundingBox*, often returning 0 instead of leaving it
      // null/undefined -- which `??` would accept as a "real" zero and
      // collapse the text quad's height. `||` here deliberately treats a
      // spurious 0 the same as missing, falling through to the next option.
      const ascent  = Math.max(1, Math.ceil(metrics.fontBoundingBoxAscent  || metrics.actualBoundingBoxAscent  || pixelHeight * 0.8));
      const descent = Math.max(0, Math.ceil(metrics.fontBoundingBoxDescent || metrics.actualBoundingBoxDescent || pixelHeight * 0.2));
      const width   = Math.max(1, Math.ceil(metrics.width));
      const height  = ascent + descent;

      if (DEBUG_ABI && !loggedOnce.has("prepare_text_metrics")) {
        loggedOnce.add("prepare_text_metrics");
        console.debug("[prepare_text]", {
          str, pixelHeight, ascent, descent, width, height,
          rawMetrics: {
            width: metrics.width,
            actualBoundingBoxAscent: metrics.actualBoundingBoxAscent,
            actualBoundingBoxDescent: metrics.actualBoundingBoxDescent,
            fontBoundingBoxAscent: metrics.fontBoundingBoxAscent,
            fontBoundingBoxDescent: metrics.fontBoundingBoxDescent,
          },
        });
      }

      fontCanvas.width  = width;
      fontCanvas.height = height;
      // Resizing the canvas resets its 2D state.
      fontBackBuffer.font = `${pixelHeight}px ${fontEntry.family}`;
      fontBackBuffer.textBaseline = "alphabetic";
      fontBackBuffer.textAlign = "left";
      fontBackBuffer.clearRect(0, 0, width, height);
      fontBackBuffer.fillStyle = "white"; // tinted later via vertex color
      fontBackBuffer.fillText(str, 0, ascent);

      let glTexture = fontEntry.prepared ? fontEntry.prepared.texture : null;
      if (!glTexture) glTexture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, glTexture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, fontCanvas);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

      fontEntry.prepared = { texture: glTexture, width, height, ascent, descent };

      return BigInt(width);
    },

    // draw_prepared_text: (font: *Font, x: s64, y: s64, text_color: Vector4, effects: Font_Effects = 0)
    web_draw_prepared_text: (fontPtr, x, y, textColorPtr, effects) => {
      const handle = jaiView().getInt32(Number(fontPtr), true);
      const fontEntry = fonts[handle];
      if (!fontEntry || !fontEntry.prepared) return;

      const color = readVec4(textColorPtr);
      const { texture, width, height, ascent, descent } = fontEntry.prepared;

      // Text uses the same batched pipeline: flush whatever's pending under
      // the current shader/scissor state, draw this quad on its own with
      // the image shader, then restore state as we found it.
      flushBatch();
      const prevMode = shaderMode, prevTex = currentTextureHandle, prevBlend = blendEnabled;

      const texIndex = textures.push({ glTexture: texture, width, height }) - 1;
      shaderMode = "image";
      currentTextureHandle = texIndex;
      blendEnabled = true;

      const bx = Number(x), by = Number(y) - descent;
      const tx = bx + width, ty = by + height;

      if (DEBUG_ABI && !loggedOnce.has("draw_prepared_text_values")) {
        loggedOnce.add("draw_prepared_text_values");
        console.debug("[draw_prepared_text]", {
          rawX: Number(x), rawY: Number(y),
          ascent, descent, width, height,
          bx, by, tx, ty,
          canvasHeight: gl.canvas.clientHeight,
          pixelHeight: fontEntry.pixelHeight,
        });
      }

      pushVertex(bx, by, color, 0, 0);
      pushVertex(tx, by, color, 1, 0);
      pushVertex(tx, ty, color, 1, 1);
      pushVertex(bx, by, color, 0, 0);
      pushVertex(tx, ty, color, 1, 1);
      pushVertex(bx, ty, color, 0, 1);
      flushBatch();

      textures.pop(); // that push above was just to reuse flushBatch's texture lookup

      shaderMode = prevMode;
      currentTextureHandle = prevTex;
      blendEnabled = prevBlend;
    },

    // get_mouse_pointer_position: (window: Window_Type, right_handed: bool) -> (x: int, y: int, success: bool)
    // REVISED: real wasm multi-value return (no sret pointer -- see the ABI
    // probe / DEBUG_ABI notes above). Each s64 field becomes its own i64
    // result; the trailing bool becomes its own i32 result.
    web_get_mouse_pointer_position: (window, right_handed) => {
      const h = gl.canvas.clientHeight;
      const x = Math.round(mouseX);
      const y = right_handed ? Math.round(h - mouseY) : Math.round(mouseY);
      return [BigInt(x), BigInt(y), mouseInside ? 1 : 0];
    },

    // get_font_at_size: (memory: [] u8, pixel_height: int) -> *Font
    // This returns a *pointer* to a Web_Font, not the struct by value or a
    // multi-value return (per the original Draw_Procs comment: `-> *Font`).
    // There is no incoming sret pointer -- we have to allocate the memory
    // ourselves via the exported basic_alloc and hand back that address.
    //
    // This is very likely called every frame (GetRect's label drawing calls
    // get_default_font_at_size per button/label), so it's cached by
    // (memory pointer, size, pixel_height) to avoid re-allocating and
    // re-loading the same font every frame. The em_width/character_height
    // written below are only a rough guess (the real font hasn't finished
    // async-loading yet); once FontFace.load() resolves, we go back and
    // overwrite the *same* allocated memory with metrics measured from the
    // real font. Since GetRect holds onto this pointer, it picks up the
    // corrected values automatically on its next read -- no re-alloc needed.
    web_get_font_at_size: (memory, pixel_height) => {
      const { count, data } = jaiString(memory);
      const px  = Number(pixel_height);
      const key = `${data}:${count}:${px}`;

      const cached = fontCacheByKey.get(key);
      if (cached !== undefined) return cached;

      const rawFont = new Uint8Array(allocated.buffer, data, count).slice();

      const index      = fonts.length;
      const familyName = `getrect-font-${index}`;

      const fontEntry = { family: familyName, pixelHeight: px, ready: false, prepared: null };
      fonts.push(fontEntry);

      const WEB_FONT_SIZE = 12; // handle:s32 + em_width:s32 + character_height:s32
      const ptr = instance.exports.basic_alloc(jaiContext, WEB_FONT_SIZE);
      const p = Number(ptr);

      // NOTE: character_height is NOT a computed line-height metric -- per
      // the native backend's load_font_part_2 (`result.character_height =
      // pixel_height;`), it's just the raw requested point size, verbatim,
      // and never changes. Only em_width needs refining once the real font
      // has loaded (native derives it from the 'M' glyph's width too).
      const view = jaiView();
      view.setInt32(p,     index,               true); // handle
      view.setInt32(p + 4, Math.round(px * 0.6), true); // em_width (placeholder, refined below)
      view.setInt32(p + 8, px,                   true); // character_height (matches native exactly, never changes)

      const resultPtr = BigInt(p);
      fontCacheByKey.set(key, resultPtr);

      const fontFace = new FontFace(familyName, rawFont);
      document.fonts.add(fontFace);
      fontFace.load().then(() => {
        fontEntry.ready = true;

        // Real em_width, now that the font has actually loaded -- mirrors
        // native's FT_ROUND(face.glyph.metrics.width) for the 'M' glyph.
        fontBackBuffer.font = `${px}px ${familyName}`;
        const m = fontBackBuffer.measureText("M");
        const realEmWidth = Math.max(1, Math.round(m.width));

        const view2 = jaiView();
        view2.setInt32(p + 4, realEmWidth, true);
      }).catch((err) => console.error(`(Font) failed to load: ${err}`));

      return resultPtr;
    },

    // immediate_triangle: (p0,p1,p2: Vector3, c0,c1,c2: Vector4 = white, uv0,uv1,uv2: Vector2 = {}, normal: Vector3 = {z=1})
    web_immediate_triangle: (p0, p1, p2, c0, c1, c2, uv0, uv1, uv2, normal) => {
      const P0 = readVec3(p0), P1 = readVec3(p1), P2 = readVec3(p2);
      const C0 = readVec4(c0), C1 = readVec4(c1), C2 = readVec4(c2);
      const UV0 = readVec2(uv0), UV1 = readVec2(uv1), UV2 = readVec2(uv2);
      pushVertex(P0[0], P0[1], C0, UV0[0], UV0[1]);
      pushVertex(P1[0], P1[1], C1, UV1[0], UV1[1]);
      pushVertex(P2[0], P2[1], C2, UV2[0], UV2[1]);
    },

    // immediate_quad: (p0,p1,p2,p3: Vector2, color: Vector4 = white, uv0..uv3: Vector2 = unit square)
    web_immediate_quad: (p0, p1, p2, p3, color, uv0, uv1, uv2, uv3) => {
      const P0 = readVec2(p0), P1 = readVec2(p1), P2 = readVec2(p2), P3 = readVec2(p3);
      const C = readVec4(color);
      const UV0 = readVec2(uv0), UV1 = readVec2(uv1), UV2 = readVec2(uv2), UV3 = readVec2(uv3);
      pushVertex(P0[0], P0[1], C, UV0[0], UV0[1]);
      pushVertex(P1[0], P1[1], C, UV1[0], UV1[1]);
      pushVertex(P2[0], P2[1], C, UV2[0], UV2[1]);
      pushVertex(P0[0], P0[1], C, UV0[0], UV0[1]);
      pushVertex(P2[0], P2[1], C, UV2[0], UV2[1]);
      pushVertex(P3[0], P3[1], C, UV3[0], UV3[1]);
    },

    // immediate_flush: ()
    web_immediate_flush: () => { flushBatch(); },
  };

  const importObject = {
    env: new Proxy(withAbiProbe(exported_js_functions), {
      get(target, prop) {
        if (target.hasOwnProperty(prop)) return target[prop];
        return (...args) => { throw new Error("Missing wasm import: " + String(prop)); };
      },
    }),
  };

  // =========================================================================
  // Frame loop
  // =========================================================================

  function resizeCanvas() {
    const width = canvas.clientWidth, height = canvas.clientHeight;
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
      gl.viewport(0, 0, width, height);
    }
  }

  let lastTime = 0;
  function render(currentTimeMs) {
    resizeCanvas();

    const now = currentTimeMs / 1000;
    const dt = now - lastTime;
    lastTime = now;

    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    instance.exports.collect_render_commands(jaiContext, gl.canvas.clientWidth, gl.canvas.clientHeight, now, dt);
    flushBatch(); // catch anything the Jai side didn't explicitly flush

    requestAnimationFrame(render);
  }

  const result = await WebAssembly.instantiateStreaming(fetch("index.wasm"), importObject);
  instance   = result.instance;
  allocated  = instance.exports.memory;
  jaiContext = instance.exports.init();

  requestAnimationFrame(render);

</script>
