<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bean Game Website</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1e; height: 100%; }
  canvas { position: fixed; top: 0; left: 0; }
  #glCanvas { z-index: 1; }
  #textCanvas { z-index: 2; pointer-events: none; }
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #ccc; font-size: 14px; z-index: 10; text-align: center;
  }
  #status.error { color: #ff6b6b; white-space: pre-wrap; max-width: 80vw; text-align: left; }
  #status.hidden { display: none; }
</style>
</head>
<body>
<canvas id="glCanvas"></canvas>
<canvas id="textCanvas"></canvas>
<div id="status">Loading index.wasm…</div>

<script>
"use strict";

/* =====================================================================
   ASSUMPTIONS ABOUT JAI'S WASM ABI — read this if things don't work.

   1. Import namespace: assumes index.wasm expects its imports under the
      "env" module (the common toolchain default). If instantiation
      throws a LinkError naming a different module string, change the
      "env" key near the bottom to match.

   2. Struct-by-value params (Vector2/3/4, string, [] u8): you confirmed
      string / Array_View_64 cross the FFI boundary as a POINTER into
      linear memory. I've extended that same rule to Vector2/Vector3/
      Vector4 (pointer-to-floats rather than flattened float args),
      since a uniform "pass the address of any struct" rule is the
      simplest thing for a from-scratch WASM backend to implement, and
      it's the only data point we have. This part is NOT confirmed.
      If geometry/colors come out garbled or nonsensical (as opposed to
      a LinkError), this is the first thing to suspect — it would mean
      vectors are flattened into individual float parameters instead,
      which needs the affected function *signatures* below changed
      (not just the read* helpers), since flattening changes the
      argument count itself.

   3. get_mouse_pointer_position's 3-way return (x, y, success) is
      assumed to use a hidden "structure return" pointer as an implicit
      first parameter (caller allocates space, callee writes the
      result there) — inferred from the metaprogram synthesizing an
      explicit Composite_Return struct for the #foreign declaration,
      which points at single-struct-return lowering rather than wasm's
      separate multi-value-returns feature. If wrong, the fix is to
      make this JS function *return* [x, y, success] as an array
      instead of writing through retPtr.

   4. Coordinate system: assumed Y-up, origin bottom-left (matching
      typical Simp/GL convention) for positions, mouse coords, and
      scissor rects. The 2D text canvas (natively Y-down) is flipped
      to match.

   5. Pointers are 64-bit (i64/BigInt) at the wasm boundary, not 32-bit,
      confirmed by testing against the real compiled binary — Jai
      appears to represent all pointers as 64-bit values even though
      the actual linear-memory addresses fit comfortably in 32 bits.
      Every pointer PARAMETER we receive directly from wasm must be
      unwrapped with Number(...) before use as a byte offset; every
      pointer we construct ourselves and hand back to wasm (a return
      value, or an argument we pass into a wasm export) must be wrapped
      with BigInt(...). Values we read out of memory ourselves via
      DataView (e.g. the `data` field inside a string/array-view
      struct) are unaffected — DataView getters always hand back a
      plain Number regardless of the conceptual width of what's stored.

   Known, deliberate simplifications:
   - Text draws onto a separate always-on-top 2D canvas layered over
     the WebGL canvas, rather than being interleaved into true z-order
     with immediate_triangle/immediate_quad. Correct for the common
     case (text drawn over shape backgrounds); wrong if some shape is
     meant to draw on top of text.
   - texture_load_from_memory / get_font_at_size decode asynchronously
     (no browser API decodes images/fonts synchronously). A handle is
     minted and a placeholder used immediately; the real texture/font
     swaps in silently once decoding finishes.
   - Font_Effects bit flags are accepted but not decoded (encoding
     wasn't specified).
   - No draw proc exposes the theme's background color, so the canvas
     just clears to a fixed dark gray.
   - process_event / Input.Event are NOT wired up. get_mouse_pointer_
     position works (so hover feedback should work), but clicks/keys
     won't reach GetRect — Input.Event's layout wasn't given, and I'd
     rather flag that than guess at a struct layout that then silently
     writes malformed data into wasm memory. Happy to wire this up if
     you share Input.Event's definition.
   ===================================================================== */

// ---------------------------------------------------------------------
// DOM / canvas setup
// ---------------------------------------------------------------------
const glCanvas = document.getElementById('glCanvas');
const textCanvas = document.getElementById('textCanvas');
const statusEl = document.getElementById('status');
const textCtx = textCanvas.getContext('2d');

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.classList.toggle('error', !!isError);
  statusEl.classList.remove('hidden');
}
function hideStatus() { statusEl.classList.add('hidden'); }

const gl = glCanvas.getContext('webgl2');
if (!gl) {
  setStatus('WebGL2 is not available in this browser.', true);
  throw new Error('WebGL2 unavailable');
}

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  glCanvas.width = w; glCanvas.height = h;
  textCanvas.width = w; textCanvas.height = h;
  gl.viewport(0, 0, w, h);
}
window.addEventListener('resize', resize);
resize();

// ---------------------------------------------------------------------
// Mouse tracking (backs get_mouse_pointer_position). Listening on
// window rather than a specific canvas avoids the two stacked
// canvases fighting over pointer events.
// ---------------------------------------------------------------------
let mouseX = 0, mouseY = 0, mouseInside = false;
window.addEventListener('pointermove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('pointerenter', () => mouseInside = true);
window.addEventListener('pointerleave', () => mouseInside = false);

// ---------------------------------------------------------------------
// Shaders: one program handles both flat-color and textured draws,
// switched via a uniform, matching set_shader_for_color / _for_images.
// ---------------------------------------------------------------------
const VERT_SRC = `#version 300 es
layout(location=0) in vec3 a_position;
layout(location=1) in vec4 a_color;
layout(location=2) in vec2 a_uv;
uniform vec2 u_resolution;
out vec4 v_color;
out vec2 v_uv;
void main() {
  // Y-up, origin bottom-left pixel space -> clip space. GL clip space
  // is also Y-up, so no flip is needed here (see assumption #4 above).
  vec2 clip = (a_position.xy / u_resolution) * 2.0 - 1.0;
  gl_Position = vec4(clip, 0.0, 1.0);
  v_color = a_color;
  v_uv = a_uv;
}`;

const FRAG_SRC = `#version 300 es
precision mediump float;
in vec4 v_color;
in vec2 v_uv;
uniform bool u_useTexture;
uniform sampler2D u_texture;
out vec4 fragColor;
void main() {
  fragColor = u_useTexture ? texture(u_texture, v_uv) * v_color : v_color;
}`;

function compileShader(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(sh);
    gl.deleteShader(sh);
    throw new Error('Shader compile failed: ' + log);
  }
  return sh;
}

const program = gl.createProgram();
gl.attachShader(program, compileShader(gl.VERTEX_SHADER, VERT_SRC));
gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, FRAG_SRC));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error('Program link failed: ' + gl.getProgramInfoLog(program));
}
const u_resolution = gl.getUniformLocation(program, 'u_resolution');
const u_useTexture = gl.getUniformLocation(program, 'u_useTexture');
const u_textureSampler = gl.getUniformLocation(program, 'u_texture');

// ---------------------------------------------------------------------
// Batched immediate-mode vertex buffer: x,y,z, r,g,b,a, u,v per vertex.
// ---------------------------------------------------------------------
const FLOATS_PER_VERTEX = 9;
let vertexCapacity = 8192; // in vertices
let vertexData = new Float32Array(vertexCapacity * FLOATS_PER_VERTEX);
let vertexCount = 0;

const vao = gl.createVertexArray();
const vbo = gl.createBuffer();
gl.bindVertexArray(vao);
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, vertexData.byteLength, gl.DYNAMIC_DRAW);
const STRIDE = FLOATS_PER_VERTEX * 4;
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 3, gl.FLOAT, false, STRIDE, 0);
gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 4, gl.FLOAT, false, STRIDE, 12);
gl.enableVertexAttribArray(2); gl.vertexAttribPointer(2, 2, gl.FLOAT, false, STRIDE, 28);
gl.bindVertexArray(null);

gl.disable(gl.DEPTH_TEST);
gl.disable(gl.CULL_FACE);
gl.clearColor(0.1, 0.1, 0.12, 1.0);

function growIfNeeded(extraVerts) {
  if (vertexCount + extraVerts <= vertexCapacity) return;
  while (vertexCapacity < vertexCount + extraVerts) vertexCapacity *= 2;
  const bigger = new Float32Array(vertexCapacity * FLOATS_PER_VERTEX);
  bigger.set(vertexData.subarray(0, vertexCount * FLOATS_PER_VERTEX));
  vertexData = bigger;
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferData(gl.ARRAY_BUFFER, vertexData.byteLength, gl.DYNAMIC_DRAW);
}

function pushVertex(x, y, z, r, g, b, a, u, v) {
  growIfNeeded(1);
  const base = vertexCount * FLOATS_PER_VERTEX;
  vertexData[base + 0] = x; vertexData[base + 1] = y; vertexData[base + 2] = z;
  vertexData[base + 3] = r; vertexData[base + 4] = g; vertexData[base + 5] = b; vertexData[base + 6] = a;
  vertexData[base + 7] = u; vertexData[base + 8] = v;
  vertexCount++;
}

// ---------------------------------------------------------------------
// Draw-proc state: current shader mode / texture / scissor.
// State-changing procs auto-flush any pending batch first, so a state
// change mid-batch can never retroactively affect already-queued verts.
// ---------------------------------------------------------------------
let useTextureMode = false;
let currentTexture = null;
let blendEnabled = false;
let scissorRect = null; // {x0,y0,x1,y1} or null

function autoFlush() { if (vertexCount > 0) flushBatch(); }

function flushBatch() {
  if (vertexCount === 0) return;
  gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, vertexData.subarray(0, vertexCount * FLOATS_PER_VERTEX));

  if (blendEnabled) { gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA); }
  else gl.disable(gl.BLEND);

  if (scissorRect) {
    gl.enable(gl.SCISSOR_TEST);
    gl.scissor(scissorRect.x0, scissorRect.y0, scissorRect.x1 - scissorRect.x0, scissorRect.y1 - scissorRect.y0);
  } else {
    gl.disable(gl.SCISSOR_TEST);
  }

  gl.useProgram(program);
  gl.uniform2f(u_resolution, glCanvas.width, glCanvas.height);
  gl.uniform1i(u_useTexture, useTextureMode ? 1 : 0);
  if (useTextureMode) {
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, currentTexture || whiteTexture);
    gl.uniform1i(u_textureSampler, 0);
  }
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, vertexCount);
  gl.bindVertexArray(null);
  vertexCount = 0;
}

const whiteTexture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, whiteTexture);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([255, 255, 255, 255]));

// ---------------------------------------------------------------------
// WASM <-> JS memory helpers.
// wasmMemory.buffer is re-read fresh each time (never cached) because
// it can be detached/replaced whenever the wasm module's memory grows.
// ---------------------------------------------------------------------
let wasmMemory = null;
function membuf() { return wasmMemory.buffer; }

function readArrayView(ptr) {
  // Newstring / Array_View_64 :: struct { count: s64; data: *u8; }
  // Read conservatively as a 16-byte block (8-byte count + pointer,
  // padded to 8-byte alignment).
  const dv = new DataView(membuf(), Number(ptr), 16);
  const count = Number(dv.getBigInt64(0, true));
  const dataPtr = dv.getUint32(8, true);
  return { count, dataPtr };
}
const utf8Decoder = new TextDecoder('utf-8');
function readJaiString(ptr) {
  const { count, dataPtr } = readArrayView(ptr);
  return utf8Decoder.decode(new Uint8Array(membuf(), dataPtr, count));
}
function readVec2(ptr) {
  const dv = new DataView(membuf(), Number(ptr), 8);
  return { x: dv.getFloat32(0, true), y: dv.getFloat32(4, true) };
}
function readVec3(ptr) {
  const dv = new DataView(membuf(), Number(ptr), 12);
  return { x: dv.getFloat32(0, true), y: dv.getFloat32(4, true), z: dv.getFloat32(8, true) };
}
function readVec4(ptr) {
  const dv = new DataView(membuf(), Number(ptr), 16);
  return { x: dv.getFloat32(0, true), y: dv.getFloat32(4, true), z: dv.getFloat32(8, true), w: dv.getFloat32(12, true) };
}

// ---------------------------------------------------------------------
// Textures. *Texture is *s32 (a JS_Handle slot Jai owns); we mint an
// index into `textures` and write it into that slot.
// ---------------------------------------------------------------------
const textures = []; // index -> WebGLTexture

function web_texture_load_from_memory(texturePtr, memPtr, srgb, buildMipmaps) {
  const { count, dataPtr } = readArrayView(memPtr);
  // Copy bytes out NOW: wasm memory can move/detach before the async
  // decode below finishes.
  const bytes = new Uint8Array(membuf(), dataPtr, count).slice();

  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([255, 255, 255, 255]));
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  const handle = textures.length;
  textures.push(tex);
  new DataView(membuf()).setInt32(Number(texturePtr), handle, true);

  // Browsers have no synchronous compressed-image decode, so this
  // resolves later; the placeholder above is used in the meantime.
  createImageBitmap(new Blob([bytes])).then(bitmap => {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, srgb ? gl.SRGB8_ALPHA8 : gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, bitmap);
    if (buildMipmaps) {
      gl.generateMipmap(gl.TEXTURE_2D);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
    }
  }).catch(err => console.error('[texture_load_from_memory] decode failed:', err));

  return true;
}

function web_set_scissor(x0, y0, x1, y1) {
  autoFlush();
  scissorRect = { x0, y0, x1, y1 };
}
function web_clear_scissor() {
  autoFlush();
  scissorRect = null;
}
function web_set_shader_for_color(enableBlend) {
  autoFlush();
  useTextureMode = false;
  currentTexture = null;
  blendEnabled = !!enableBlend;
}
function web_set_shader_for_images(texturePtr) {
  autoFlush();
  const handle = new DataView(membuf()).getInt32(Number(texturePtr), true);
  currentTexture = textures[handle] || null;
  useTextureMode = true;
  blendEnabled = true; // images always blend; only set_shader_for_color exposes the flag
}

// ---------------------------------------------------------------------
// Fonts + text. draw_prepared_text takes no text/handle argument, so
// (per Simp's own convention) it just draws whatever prepare_text most
// recently shaped — a single "last prepared" slot is enough for the
// normal measure-then-draw usage pattern.
// ---------------------------------------------------------------------
const fonts = []; // index -> { familyName, pixelHeight }
let lastPrepared = null; // { text, familyName, pixelHeight }
let fontHandleCounter = 0;

function web_get_font_at_size(memPtr, pixelHeightBig) {
  const pixelHeight = Number(pixelHeightBig);
  const { count, dataPtr } = readArrayView(memPtr);
  const fontBytes = new Uint8Array(membuf(), dataPtr, count).slice();

  const familyName = 'jaiFont' + (fontHandleCounter++);
  const face = new FontFace(familyName, fontBytes.buffer);
  document.fonts.add(face);
  face.load().catch(err => console.error('[get_font_at_size] font load failed:', err));

  textCtx.font = pixelHeight + 'px ' + familyName + ', sans-serif';
  const m = textCtx.measureText('M'); // approximate metrics; exact once the FontFace finishes loading
  const emWidth = Math.max(1, Math.round(m.width));

  const handle = fonts.length;
  fonts.push({ familyName, pixelHeight });

  if (!ctxPtr) {
    // See note near init() below: if GetRect loads a default font
    // during ui_init() (i.e. before init() has returned to JS), ctxPtr
    // isn't set yet and this basic_alloc call will use a stale value.
    console.warn('[get_font_at_size] called before init() returned a context pointer; basic_alloc may misbehave.');
  }

  // Web_Font :: { handle: s32; em_width: s32; character_height: s32; } -> 12 bytes
  const ptr = Number(wasmExports.basic_alloc(ctxPtr, 12));
  const dv = new DataView(membuf());
  dv.setInt32(ptr + 0, handle, true);
  dv.setInt32(ptr + 4, emWidth, true);
  dv.setInt32(ptr + 8, Math.round(pixelHeight), true);
  // get_font_at_size's return type is *Font, a pointer — and pointers
  // are i64 at this boundary (confirmed: this is what was throwing
  // "Cannot convert N to a BigInt"). `ptr` stays a plain Number above
  // because it's used for local arithmetic/DataView offsets, but the
  // value handed back to wasm has to be a real BigInt.
  return BigInt(ptr);
}

function web_prepare_text(fontPtr, textPtr, effects) {
  const fontDv = new DataView(membuf(), Number(fontPtr), 12);
  const handle = fontDv.getInt32(0, true);
  const info = fonts[handle];
  const text = readJaiString(textPtr);

  textCtx.font = info.pixelHeight + 'px ' + info.familyName + ', sans-serif';
  const width = Math.ceil(textCtx.measureText(text).width);

  lastPrepared = { text, familyName: info.familyName, pixelHeight: info.pixelHeight };
  return BigInt(width); // s64 return -> must be a BigInt
}

function web_draw_prepared_text(fontPtr, xBig, yBig, colorPtr, effects) {
  if (!lastPrepared) return;
  const x = Number(xBig), y = Number(yBig);
  const c = readVec4(colorPtr);

  textCtx.save();
  if (scissorRect) {
    textCtx.beginPath();
    textCtx.rect(
      scissorRect.x0, textCanvas.height - scissorRect.y1,
      scissorRect.x1 - scissorRect.x0, scissorRect.y1 - scissorRect.y0
    );
    textCtx.clip();
  }
  textCtx.font = lastPrepared.pixelHeight + 'px ' + lastPrepared.familyName + ', sans-serif';
  textCtx.fillStyle = `rgba(${Math.round(c.x * 255)}, ${Math.round(c.y * 255)}, ${Math.round(c.z * 255)}, ${c.w})`;
  textCtx.textAlign = 'left';
  textCtx.textBaseline = 'alphabetic'; // (x,y) is the left-baseline point, matching the Y-up convention
  textCtx.fillText(lastPrepared.text, x, textCanvas.height - y);
  textCtx.restore();
}

// ---------------------------------------------------------------------
// Mouse position (GetRect pulls this rather than us pushing events).
// ---------------------------------------------------------------------
function web_get_mouse_pointer_position(retPtr, windowFlag, rightHanded) {
  const dv = new DataView(membuf());
  const y = rightHanded ? (glCanvas.height - mouseY) : mouseY;
  const ptr = Number(retPtr);
  dv.setBigInt64(ptr + 0, BigInt(Math.round(mouseX)), true);
  dv.setBigInt64(ptr + 8, BigInt(Math.round(y)), true);
  dv.setUint8(ptr + 16, mouseInside ? 1 : 0);
}

// ---------------------------------------------------------------------
// Immediate triangles / quads.
// ---------------------------------------------------------------------
function web_immediate_triangle(p0Ptr, p1Ptr, p2Ptr, c0Ptr, c1Ptr, c2Ptr, uv0Ptr, uv1Ptr, uv2Ptr, normalPtr) {
  const p0 = readVec3(p0Ptr), p1 = readVec3(p1Ptr), p2 = readVec3(p2Ptr);
  const c0 = readVec4(c0Ptr), c1 = readVec4(c1Ptr), c2 = readVec4(c2Ptr);
  const uv0 = readVec2(uv0Ptr), uv1 = readVec2(uv1Ptr), uv2 = readVec2(uv2Ptr);
  // normal (param9) is unused — no lighting for a 2D UI.
  pushVertex(p0.x, p0.y, p0.z, c0.x, c0.y, c0.z, c0.w, uv0.x, uv0.y);
  pushVertex(p1.x, p1.y, p1.z, c1.x, c1.y, c1.z, c1.w, uv1.x, uv1.y);
  pushVertex(p2.x, p2.y, p2.z, c2.x, c2.y, c2.z, c2.w, uv2.x, uv2.y);
}

function web_immediate_quad(p0Ptr, p1Ptr, p2Ptr, p3Ptr, colorPtr, uv0Ptr, uv1Ptr, uv2Ptr, uv3Ptr) {
  const p0 = readVec2(p0Ptr), p1 = readVec2(p1Ptr), p2 = readVec2(p2Ptr), p3 = readVec2(p3Ptr);
  const c = readVec4(colorPtr);
  const uv0 = readVec2(uv0Ptr), uv1 = readVec2(uv1Ptr), uv2 = readVec2(uv2Ptr), uv3 = readVec2(uv3Ptr);
  pushVertex(p0.x, p0.y, 0, c.x, c.y, c.z, c.w, uv0.x, uv0.y);
  pushVertex(p1.x, p1.y, 0, c.x, c.y, c.z, c.w, uv1.x, uv1.y);
  pushVertex(p2.x, p2.y, 0, c.x, c.y, c.z, c.w, uv2.x, uv2.y);
  pushVertex(p0.x, p0.y, 0, c.x, c.y, c.z, c.w, uv0.x, uv0.y);
  pushVertex(p2.x, p2.y, 0, c.x, c.y, c.z, c.w, uv2.x, uv2.y);
  pushVertex(p3.x, p3.y, 0, c.x, c.y, c.z, c.w, uv3.x, uv3.y);
}

function web_immediate_flush() {
  flushBatch();
}

// ---------------------------------------------------------------------
// Jai's own runtime support (NOT one of your Draw_Procs) apparently
// calls out to this when reporting things like assertion failures —
// it showed up as "Missing function: wasm_write_string" via your Proxy
// trap, called from write_string_unsynchronized while handling an
// assertion failure inside ui_per_frame_update. Implementing it should
// surface the actual assertion message so we can see what's wrong,
// rather than just that something is. Guessing it takes a single
// pointer-to-string-struct argument, consistent with every other
// string parameter we've seen so far; the catch block logs the raw
// arguments if that guess is wrong, so we can adjust from real data.
// ---------------------------------------------------------------------
function wasm_write_string(strPtr) {
  try {
    const text = readJaiString(strPtr);
    console.log('%c[jai]', 'color:#ff6b6b;font-weight:bold', text);
  } catch (e) {
    console.warn('[wasm_write_string] got arguments', arguments,
      '- could not read as a single string-struct pointer:', e);
  }
}

// ---------------------------------------------------------------------
// WASM instantiation + main loop.
// ---------------------------------------------------------------------
let wasmExports = null;
let ctxPtr = 0n;

// NOTE: keys here use the "web_" prefix, matching the #foreign
// declarations in your metaprogram-expanded code (e.g.
// `web_texture_load_from_memory`), NOT the outer wrapper names
// (`texture_load_from_memory`) that GetRect actually calls.
const exportedJsFunctions = {
  web_texture_load_from_memory: web_texture_load_from_memory,
  web_set_scissor: web_set_scissor,
  web_clear_scissor: web_clear_scissor,
  web_set_shader_for_color: web_set_shader_for_color,
  web_set_shader_for_images: web_set_shader_for_images,
  web_prepare_text: web_prepare_text,
  web_draw_prepared_text: web_draw_prepared_text,
  web_get_mouse_pointer_position: web_get_mouse_pointer_position,
  web_get_font_at_size: web_get_font_at_size,
  web_immediate_triangle: web_immediate_triangle,
  web_immediate_quad: web_immediate_quad,
  web_immediate_flush: web_immediate_flush,
};

const importObject = {
  "env": new Proxy(exportedJsFunctions, {
    get(target, prop, receiver) {
      if (target.hasOwnProperty(prop)) {
        return target[prop];
      }

      return () => { throw new Error("Missing function: " + prop); }
    }
  })
};

let lastTime = null;
let consecutiveErrors = 0;

function frame(nowMs) {
  try {
    gl.clear(gl.COLOR_BUFFER_BIT);
    textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);

    const now = nowMs / 1000;
    const dt = lastTime === null ? 0 : (now - lastTime);
    lastTime = now;

    wasmExports.collect_render_commands(ctxPtr, glCanvas.width, glCanvas.height, now, dt);
    consecutiveErrors = 0;
  } catch (err) {
    consecutiveErrors++;
    console.error('[frame] error calling into wasm:', err);
    setStatus('Runtime error (see console):\n' + err.message, true);
    if (consecutiveErrors > 5) {
      console.error('Too many consecutive errors — stopping the render loop.');
      return;
    }
  }
  requestAnimationFrame(frame);
}

(async function boot() {
  try {
    setStatus('Loading index.wasm…');
    let result;
    try {
      result = await WebAssembly.instantiateStreaming(fetch('index.wasm'), importObject);
    } catch (streamErr) {
      // Fallback for servers not sending application/wasm, or browsers
      // without instantiateStreaming.
      const bytes = await (await fetch('index.wasm')).arrayBuffer();
      result = await WebAssembly.instantiate(bytes, importObject);
    }
    wasmExports = result.instance.exports;
    wasmMemory = wasmExports.memory; // assumes the module exports its own memory as "memory"
    ctxPtr = wasmExports.init();
    hideStatus();
    requestAnimationFrame(frame);
  } catch (err) {
    console.error(err);
    setStatus('Failed to load index.wasm:\n' + err.message, true);
  }
})();
</script>
